<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoire</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&family=Caveat:wght@400;600&family=Dancing+Script:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Pacifico&family=Lobster&family=Great+Vibes&family=Satisfy&family=Sacramento&family=Raleway:wght@300;400;700&family=Cinzel:wght@400;700&family=Abril+Fatface&family=Righteous&family=Kaushan+Script&family=Permanent+Marker&family=Special+Elite&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="file" id="fi-cover" accept="image/*">
<input type="file" id="fi-cell" accept="image/*">
<input type="file" id="fi-free" accept="image/*">

<div id="screen-home">
  <div class="home-header">
    <div><div class="brand">mem<em>oire</em></div><div class="brand-tag">Your digital photo albums</div></div>
    <button class="btn-create" onclick="openCreateModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create Album
    </button>
  </div>
  <div class="hdivider"></div>
  <div class="shelf-lbl">Your Albums</div>
  <div class="shelf" id="shelf"></div>
</div>

<div id="screen-viewer">
  <div class="viewer-bar">
    <div class="vtitle" id="vtitle">Album</div>
    <button class="vbtn" onclick="closeViewer()">← Back</button>
    <button class="vbtn" onclick="openEditorFromViewer()">✏ Edit</button>
    <button class="vbtn rose" onclick="openExportModal()">↓ Export</button>
  </div>
  <div class="viewer-stage" id="viewer-stage">
    <div class="book-wrap" id="book-wrap">
      <button class="varrow vl" id="varrow-l" onclick="viewerPrev()">‹</button>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="v-spread" id="v-spread">
          <div class="v-page v-page-left" id="vp-left">
            <div class="v-page-inner" id="vpi-left"></div>
            <div class="vpage-num" id="vpnum-left"></div>
          </div>
          <div class="v-spine" id="v-spine"></div>
          <div class="v-page v-page-right" id="vp-right">
            <div class="v-page-inner" id="vpi-right"></div>
            <div class="vpage-num" id="vpnum-right"></div>
          </div>
        </div>
        <div class="vspread-num" id="vspread-num">Spread 1 of 1</div>
      </div>
      <button class="varrow vr" id="varrow-r" onclick="viewerNext()">›</button>
    </div>
  </div>
</div>

<div id="screen-editor">
    <div class="ed-bar">
        <button class="ebtn" onclick="goHome()">← Home</button>
        <div class="esep"></div>
        <input class="ename" id="ename" type="text" value="My Album">
        <div class="esep"></div>
        <button class="ebtn" onclick="openViewer()">👁 View</button>
        <button class="ebtn" onclick="openExportModal()">⬆ Share</button>
        <button class="ebtn rose" onclick="openExportModal()">↓ Export</button>
    </div>
    <div class="ed-body">
        <div class="canvas-area">
            <div class="page-nav">
                <button class="pnav-btn" id="pnav-prev" onclick="scrollToPage(-1)">◀</button>
                <div class="pnav-lbl" id="pnav-lbl">Page 1</div>
                <button class="pnav-btn" id="pnav-next" onclick="scrollToPage(1)">▶</button>
            </div>
            <div class="pages-scroll" id="pages-scroll">
                <div class="add-page-btn" id="add-page-btn" onclick="addPage()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Page
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
